name: ${COMPOSE_PROJECT_NAME:-aapr-stu}

services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:14}
    container_name: ${COMPOSE_PROJECT_NAME:-aapr-stu}-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aapr_stu}
      POSTGRES_USER: ${POSTGRES_USER:-aapr_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aapr_password}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aapr_user} -d ${POSTGRES_DB:-aapr_stu}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    labels:
      com.aapr.story: "7.3"
      com.aapr.instance: ${INSTANCE_KEY:-stu}
      com.aapr.resource.scope: "instance"

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-aapr-backend:7.1}
    container_name: ${COMPOSE_PROJECT_NAME:-aapr-stu}-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-aapr_user}:${POSTGRES_PASSWORD:-aapr_password}@db:5432/${POSTGRES_DB:-aapr_stu}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in env file}
    ports:
      - "${BACKEND_HOST_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app_network
    labels:
      com.aapr.story: "7.3"
      com.aapr.instance: ${INSTANCE_KEY:-stu}
      com.aapr.resource.scope: "instance"

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: ${FRONTEND_IMAGE:-aapr-frontend:7.1}
    container_name: ${COMPOSE_PROJECT_NAME:-aapr-stu}-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: ${FRONTEND_RUNTIME_API_URL:-http://localhost:3000}
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:80"
    networks:
      - app_network
    labels:
      com.aapr.story: "7.3"
      com.aapr.instance: ${INSTANCE_KEY:-stu}
      com.aapr.resource.scope: "instance"

volumes:
  postgres_data:
    name: ${COMPOSE_PROJECT_NAME:-aapr-stu}-postgres-data
    external: false

networks:
  app_network:
    name: ${COMPOSE_PROJECT_NAME:-aapr-stu}-net
    external: false
